name: affine
services:

  # Service: ollama-llm
  # Purpose: Runs local LLM/embedding models and serves inference over Ollama API.
  # Provides: http://ollama-llm:11434 (internal only).
  # Uses: Model files from ./ollama-downloads and startup model list from OLLAMA_MODELS.
  # Used by: litellm.
  ollama-llm:
    image: ollama/ollama:0.16.1
    gpus: all
#    ports:
#      - 11434:11434
    volumes:
     - ./ollama-downloads:/root/.ollama
     - ./llm/ollama-entrypoint.sh:/entrypoint.sh
    tty: true
    restart: always
    environment:
     - OLLAMA_KEEP_ALIVE=24h
     - OLLAMA_HOST=0.0.0.0
     - OLLAMA_MODELS=/root/.ollama/models
     - OLLAMA_MODEL_DL=${OLLAMA_MODELS}
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/11434'"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Service: affine_ai_helper
  # Purpose: Adapts OpenAI Responses API calls (/v1/responses*) for AFFiNE to LiteLLM chat streaming.
  # Provides: http://affine_ai_helper:4011 (internal adapter endpoint).
  # Uses: litellm (LITELLM_URL + LITELLM_KEY).
  # Used by: caddy for /v1/responses* traffic.
  affine_ai_helper:
    build:
      context: ./affine_ai_helper
      dockerfile: Dockerfile
    container_name: affine_ai_helper
#    ports:
#      - 4011:4011
    environment:
      # where your LiteLLM is reachable inside Docker
      - LITELLM_URL=http://litellm:4000
      - LITELLM_KEY=${LITELLM_MASTER_KEY}
      # optional custom settings
      - PORT=4011
    depends_on:
      - litellm
    networks:
      - default
    restart: unless-stopped

  # Service: caddy
  # Purpose: Internal AI gateway with path-based routing.
  # Provides: http://caddy:80/v1 for AFFiNE.
  # Uses: Routing rules from ./affine_ai_helper/Caddyfile.
  # Used by: affine (AFFINE_OPENAI_API_URL), forwards to affine_ai_helper and litellm.
  caddy:
    image: caddy:2
    container_name: affine_ai_gateway
    volumes:
      - ./affine_ai_helper/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - affine_ai_helper
      - litellm
    restart: unless-stopped


  # Service: affine
  # Purpose: Main AFFiNE application (web + API).
  # Provides: app endpoint on port 3010 (exposed externally through public Traefik).
  # Uses: postgres, redis, caddy AI gateway, persistent storage/config volumes.
  # Used by: End users through public-gateway Traefik router.
  affine:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_server
#    ports:
#      - '3010:3010'
    labels:
      - traefik.enable=true
      - traefik.constraint-label=${TRAEFIK_CONSTRAINT_LABEL}
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK}
      - traefik.http.routers.affine.rule=Host(`${AFFINE_SERVER_HOST}`)
      - traefik.http.routers.affine.entrypoints=https
      - traefik.http.routers.affine.tls=true
      - traefik.http.routers.affine.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.routers.affine.middlewares=affine-auth
      - "traefik.http.middlewares.affine-auth.basicauth.users=${AFFINE_BASIC_AUTH_CREDENTIALS}"
      - traefik.http.services.affine.loadbalancer.server.port=3010
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
      caddy:
        condition: service_started
    volumes:
      # custom configurations
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
      - PORT=${PORT:-3010}
      - AFFINE_SERVER_HTTPS=${AFFINE_SERVER_HTTPS:-true}
      - AFFINE_SERVER_HOST=${AFFINE_SERVER_HOST}
      - AFFINE_SERVER_EXTERNAL_URL=${AFFINE_SERVER_EXTERNAL_URL}
      - COPILOT_OPENAI_API_KEY=${COPILOT_OPENAI_API_KEY}
      - AFFINE_OPENAI_API_URL=${AFFINE_OPENAI_API_URL:-http://caddy:80/v1}
      - SELFHOSTED=true
      - selfhosted=true
    networks:
      - default
      - public-gateway
    restart: unless-stopped

  # Service: affine_migration
  # Purpose: One-shot predeploy migration job required before affine starts.
  # Provides: Database/application schema initialization.
  # Uses: postgres and redis plus same mounted storage/config paths as affine.
  # Used by: affine startup dependency (service_completed_successfully).
  affine_migration:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_migration_job
    volumes:
      # custom configurations
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Service: redis
  # Purpose: Cache/session and background coordination store for AFFiNE.
  # Provides: redis://redis:6379 (internal only).
  # Uses: Default redis configuration with healthcheck.
  # Used by: affine and affine_migration.
  redis:
    image: redis:8.6.0-trixie
    container_name: affine_redis
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Service: postgres
  # Purpose: Persistent relational database (pgvector-enabled) for AFFiNE data.
  # Provides: postgresql://postgres:5432/${DB_DATABASE}.
  # Uses: Persistent volume at ${DB_DATA_LOCATION}.
  # Used by: affine and affine_migration.
  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: affine_postgres
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-affine}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # you better set a password for you database
      # or you may add 'POSTGRES_HOST_AUTH_METHOD=trust' to ignore postgres security policy
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-U', "${DB_USERNAME}", '-d', "${DB_DATABASE:-affine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Service: litellm
  # Purpose: OpenAI-compatible API proxy over local Ollama models.
  # Provides: http://litellm:4000/v1 (internal only).
  # Uses: ./litellm/config.yaml and ollama-llm backend.
  # Used by: caddy (default /v1 route) and affine_ai_helper (upstream proxy target).
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm_proxy
    depends_on:
      ollama-llm:
        condition: service_healthy
#    ports:
#      - '4000:4000'
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    environment:
      - LITELLM_LOG=info
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - default
    restart: unless-stopped

networks:
  # Network: public-gateway
  # Purpose: Shared external Traefik network used to publish affine to the internet.
  # Used by: affine (AI services remain on internal default network only).
  public-gateway:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK}
