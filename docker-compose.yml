name: affine
services:

  ollama-llm:
    image: ollama/ollama:0.16.1
    gpus: all
    ports:
      - 11434:11434
    volumes:
     - ./ollama-downloads:/root/.ollama
     - ./llm/ollama-entrypoint.sh:/entrypoint.sh
    tty: true
    restart: always
    environment:
     - OLLAMA_KEEP_ALIVE=24h
     - OLLAMA_HOST=0.0.0.0
     - OLLAMA_MODELS=/root/.ollama/models
     - OLLAMA_MODEL_DL=${OLLAMA_MODELS}
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: "bash -c 'cat < /dev/null > /dev/tcp/localhost/11434'"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  affine_ai_helper:
    build:
      context: ./affine_ai_helper
      dockerfile: Dockerfile
    container_name: affine_ai_helper
    environment:
      # where your LiteLLM is reachable inside Docker
      - LITELLM_URL=http://litellm:4000
      - LITELLM_KEY=${LITELLM_MASTER_KEY}
      # optional custom settings
      - PORT=5000
    labels:
      - traefik.enable=true
      - traefik.constraint-label=${TRAEFIK_CONSTRAINT_LABEL}
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK}
      - traefik.http.routers.affine-llm-responses.rule=Host(`${AFFINE_LLM_DOMAIN}`) && PathPrefix(`/v1/responses`)
      - traefik.http.routers.affine-llm-responses.entrypoints=https
      - traefik.http.routers.affine-llm-responses.tls=true
      - traefik.http.routers.affine-llm-responses.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.routers.affine-llm-responses.priority=200
      - traefik.http.routers.affine-llm-responses.middlewares=affine-llm-sse-headers
      - traefik.http.services.affine-llm-responses.loadbalancer.server.port=5000
      - traefik.http.middlewares.affine-llm-sse-headers.headers.customresponseheaders.X-Accel-Buffering=no
      - traefik.http.middlewares.affine-llm-sse-headers.headers.customresponseheaders.Cache-Control=no-cache
    depends_on:
      - litellm
    networks:
      - default
      - public-gateway
    restart: unless-stopped


  affine:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_server
    ports:
      - '${PORT:-3010}:3010'
    labels:
      - traefik.enable=true
      - traefik.constraint-label=${TRAEFIK_CONSTRAINT_LABEL}
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK}
      - traefik.http.routers.affine.rule=Host(`${AFFINE_DOMAIN}`)
      - traefik.http.routers.affine.entrypoints=https
      - traefik.http.routers.affine.tls=true
      - traefik.http.routers.affine.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.routers.affine.middlewares=affine-auth
      - traefik.http.middlewares.affine-auth.basicauth.users=${AFFINE_BASIC_AUTH_CREDENTIALS}
      - traefik.http.services.affine.loadbalancer.server.port=3010
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    volumes:
      # custom configurations
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
      - COPILOT_OPENAI_API_KEY=${COPILOT_OPENAI_API_KEY}
      - AFFINE_OPENAI_API_URL=${AFFINE_OPENAI_API_URL}
      - SELFHOSTED=true
      - selfhosted=true
    networks:
      - default
      - public-gateway
    restart: unless-stopped

  affine_migration:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_migration_job
    volumes:
      # custom configurations
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:8.6.0-trixie
    container_name: affine_redis
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: affine_postgres
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-affine}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # you better set a password for you database
      # or you may add 'POSTGRES_HOST_AUTH_METHOD=trust' to ignore postgres security policy
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-U', "${DB_USERNAME}", '-d', "${DB_DATABASE:-affine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm_proxy
    depends_on:
      ollama-llm:
        condition: service_healthy
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    environment:
      - LITELLM_LOG=info
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.constraint-label=${TRAEFIK_CONSTRAINT_LABEL}
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK}
      - traefik.http.routers.affine-llm-default.rule=Host(`${AFFINE_LLM_DOMAIN}`) && PathPrefix(`/v1`)
      - traefik.http.routers.affine-llm-default.entrypoints=https
      - traefik.http.routers.affine-llm-default.tls=true
      - traefik.http.routers.affine-llm-default.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.routers.affine-llm-default.priority=100
      - traefik.http.services.affine-llm-default.loadbalancer.server.port=4000
    networks:
      - default
      - public-gateway
    restart: unless-stopped

networks:
  public-gateway:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK}
